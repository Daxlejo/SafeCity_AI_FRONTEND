<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#1e293b">
    <meta name="description" content="SafeCity AI - Plataforma inteligente impulsada por OSINT y NLP para el reporte y análisis preventivo de incidentes urbanos.">
    <meta property="og:title" content="SafeCity AI - Seguridad Predictiva">
    <meta property="og:description" content="Sistema avanzado de Machine Learning para clasificación de alertas de pánico ciudadanas.">
    <meta property="og:image" content="https://unpkg.com/leaflet@1.9.4/dist/images/marker-icon.png">
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🛡️</text></svg>">
    <title>SafeCity AI - Centro de Mando Global</title>
    
    <!-- React & ReactDOM -->
    <script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>
    
    <!-- Babel para compilar JSX en el navegador directo sin compilar ni node modules -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <!-- Leaflet CSS & JS para el mapa -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" crossorigin=""/>
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" crossorigin=""></script>
    <script src="https://unpkg.com/leaflet.heat@0.2.0/dist/leaflet-heat.js"></script>
    
    <!-- Leaflet Routing Machine (Calculo Exacto de Calles vía OSRM) -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet-routing-machine@3.2.12/dist/leaflet-routing-machine.css" />
    <script src="https://unpkg.com/leaflet-routing-machine@3.2.12/dist/leaflet-routing-machine.js"></script>

    <!-- Axios -->
    <script src="https://unpkg.com/axios/dist/axios.min.js"></script>

    <!-- React Router DOM (v6) -->
    <script src="https://unpkg.com/@remix-run/router@1.21.0/dist/router.umd.min.js"></script>
    <script src="https://unpkg.com/react-router@6.28.0/dist/umd/react-router.development.js"></script>
    <script src="https://unpkg.com/react-router-dom@6.28.0/dist/umd/react-router-dom.development.js" crossorigin></script>

    <!-- STOMP & SockJS para websockets -->
    <script src="https://cdn.jsdelivr.net/npm/@stomp/stompjs@7.0.0/bundles/stomp.umd.min.js"></script>

    <!-- Chart.js para Analíticas (Sprint 7) -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <link rel="stylesheet" href="./style.css">
</head>
<body>
    <div id="root"></div>
    <!-- Cargar la aplicación React principal -->
    <script type="text/babel" src="./app.jsx"></script>
</body>
</html>
